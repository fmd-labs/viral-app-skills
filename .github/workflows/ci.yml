name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Install restish
        run: ./scripts/install-restish.sh

      - name: Bash syntax check
        run: bash -n bin/viral-app scripts/*.sh

      - name: Shellcheck
        run: shellcheck bin/viral-app scripts/*.sh

      - name: Preflight
        run: ./scripts/preflight.sh

      - name: CLI help
        run: ./bin/viral-app --help >/dev/null

      - name: Command index sanity
        run: ./scripts/command-index.sh | jq -e 'type == "array" and length > 0' >/dev/null

      - name: Skill package detection
        run: |
          npx -y skills@latest add . --list > /tmp/skills-list.txt
          grep -qi "viral-app" /tmp/skills-list.txt

      - name: Smoke checks
        run: ./scripts/smoke.sh
